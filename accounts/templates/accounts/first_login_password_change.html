{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Your Password</title>
    <link rel="stylesheet" href="{% static 'css/onboarding.css' %}">
</head>
<body>

    <div class="glass-card">
        <h2 class="onboarding-title">Welcome to AIMS</h2>
        <p class="onboarding-subtitle">For your security, please establish a new permanent password to continue.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Secure My Account</button>
        </form>
    </div>

</body>
</html>
